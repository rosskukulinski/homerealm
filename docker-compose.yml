# homerealm panel. Copy .env.example to .env first — see README.
services:
  homerealm:
    image: ghcr.io/rosskukulinski/homerealm:latest
    # To build from source instead, comment the image line and uncomment:
    # build: ./app
    container_name: homerealm
    restart: unless-stopped
    env_file: .env
    environment:
      DATA_DIR: /data
    ports:
      - "${PANEL_PORT:-8090}:${PANEL_PORT:-8090}"
    volumes:
      - ${HOST_DATA_DIR}:/data
      - /var/run/docker.sock:/var/run/docker.sock
