# homerealm panel. Copy .env.example to .env first — see README.
services:
  homerealm:
    build: ./app
    # Once published to GHCR you can use the prebuilt image instead of build:
    # image: ghcr.io/rosskukulinski/homerealm:latest
    container_name: homerealm
    restart: unless-stopped
    env_file: .env
    environment:
      DATA_DIR: /data
    ports:
      - "${PANEL_PORT:-8090}:${PANEL_PORT:-8090}"
    volumes:
      - ${HOST_DATA_DIR}:/data
      - /var/run/docker.sock:/var/run/docker.sock
