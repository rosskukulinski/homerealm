name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Python syntax + lint
        run: |
          python -m py_compile app/app.py
          pip install ruff
          ruff check app/ --ignore E501,E701,E702
      - name: Shell lint
        run: |
          sudo apt-get install -y shellcheck
          shellcheck setup.sh cli/mc-world
      - name: Docker build
        run: docker build ./app -t homerealm-test
